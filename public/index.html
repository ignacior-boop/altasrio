function diasHastaVenc(fechaStr) {
  if (!fechaStr) return null;
  const [d,m,y] = fechaStr.split('/');
  if (!d||!m||!y) return null;
  const fv = new Date(+y, +m-1, +d);
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Math.round((fv - hoy)/86400000);
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

    "dni_autorizacion_vs_uif": { "aplica": boolean, "ok": boolean or null, "detalle": string },
    "direccion_autorizacion_vs_escritura": { "ok": boolean, "detalle": string },
    "declaratoria_vs_escritura": { "aplica": boolean, "ok": boolean or null, "detalle": string },
    "declaratoria_vs_autorizacion": { "aplica": boolean, "ok": boolean or null, "detalle": string },
    "poder_habilita_firmante": { "aplica": boolean, "ok": boolean or null, "detalle": string }
  },
  "documentos_faltantes": string[], "alertas": string[],
  "veredicto": "APTO" or "OBSERVADO" or "RECHAZADO"
}

REGLAS CRÍTICAS:

TIPO DE OPERACIÓN: Determiná "tipo_operacion" leyendo la Autorización. VENTA si dice "autorización de venta", "vender", "venta del inmueble", o similar. LOCACION si dice "autorización de locación", "alquiler", "arrendamiento", "locar", "canon locativo", o similar. Usá este valor para adaptar la terminología del análisis.

Documentos obligatorios: Autorización, siempre. Escritura: OBLIGATORIA solo si tipo_operacion=VENTA (en ese caso escritura.requerida=true). Si tipo_operacion=LOCACION, escritura.requerida=false: la Escritura NO es obligatoria y aunque no esté presente, NO debe agregarse a "documentos_faltantes". Si de todos modos se adjuntó una Escritura en una locación, usala igual para verificar titularidad y m².

PERSONAS QUE DEBEN ACREDITAR IDENTIDAD (muy importante, leer con atención):
- Si NO hay declaratoria de herederos: la(s) persona(s) obligada(s) son los titulares que firman la autorización.
- Si HAY declaratoria de herederos: la persona obligada es CADA heredero que figure como autorizante en la autorización (no solo quien firmó de puño y letra), salvo que exista poder notarial que habilite a uno a representar a otro (en ese caso el representado no necesita presentar DNI/UIF propio, pero si igual los presentó, informalos también).
Para cada una de esas personas debe existir:
  a) Un DNI propio: una entrada en el array "dnis" cuyo nombre coincida con esa persona (ignorá tildes, mayúsculas/minúsculas, orden nombre-apellido y pequeñas variantes de escritura al comparar nombres — son la misma persona si el nombre y apellido coinciden).
  b) Si uif_en_escritura=false: un formulario UIF propio: una entrada en el array "uifs" cuyo nombre coincida con esa persona.
Antes de agregar algo a "documentos_faltantes", revisá CUIDADOSAMENTE los arrays "dnis" y "uifs" completos (pueden venir de PDFs separados, o varias personas pueden estar en el mismo PDF) buscando una coincidencia de nombre. Un documento de identidad puede tener frente y dorso en el mismo PDF o en PDFs distintos: no lo cuentes dos veces ni lo declares faltante si ya aparece. Solo marcá como faltante el DNI o UIF de una persona si, tras revisar TODOS los documentos adjuntos, genuinamente no hay ninguna entrada con su nombre.
Cada DNI o UIF faltante debe listarse en "documentos_faltantes" mencionando el nombre completo de la persona a la que le falta (ej: "DNI de JUAN PÉREZ", "Formulario UIF de JUAN PÉREZ").

UIF: revisar qué indica la autorización:
- Si dice explícitamente que la UIF se firma en escritura (frases como "la UIF se firma en escritura", "UIF en escritura", o similar): uif_en_escritura=true, NO es obligatoria para nadie, no advertir si falta, no cruzar.
- Si dice que la UIF se firma en el momento, o no aclara nada: uif_en_escritura=false, ES obligatoria para cada persona según la regla de arriba.
RECHAZADO si falta la Autorización, o (cuando escritura.requerida=true) falta la Escritura, o el DNI de alguna persona obligada. Si falta el UIF de alguna persona obligada y uif_en_escritura=false, también RECHAZADO.

Múltiples autorizaciones: si se presentan dos o más documentos de autorización firmados por separado (por ejemplo, cada heredero firma la suya), esto es CORRECTO. multiples_autorizaciones=true, tratarlos como un conjunto válido y cruzar los datos combinados.

Declaratoria de herederos (si está presente):
- Verificar que TODOS los herederos listados en la declaratoria aparezcan como titulares en la escritura (si hay escritura presentada).
- Verificar que TODOS los herederos aparezcan como firmantes en la autorización, SALVO que haya un poder notarial que habilite a uno a firmar en representación del resto.
- Si hay poder: verificar que el apoderado que firma la autorización coincida con el apoderado designado en el poder, y que el poderdante coincida con los herederos.
- declaratoria_vs_escritura.aplica=true (si hay escritura) y declaratoria_vs_autorizacion.aplica=true si hay declaratoria; poder_habilita_firmante.aplica=true si hay poder.

Sin declaratoria: declaratoria_vs_escritura, declaratoria_vs_autorizacion y poder_habilita_firmante tienen aplica=false, ok=null, detalle="No aplica".
Cruces que involucran a la Escritura (nombre_autorizacion_vs_escritura, direccion_autorizacion_vs_escritura, declaratoria_vs_escritura): aplica=false, ok=null, detalle="Escritura no presentada, no aplica" si escritura.encontrada=false (típico en una locación sin escritura adjunta).
nombre_autorizacion_vs_escritura: además, aplica=false (ok=null, detalle="Con declaratoria de herederos la escritura está a nombre del causante, no aplica") si hay declaratoria. Si NO hay declaratoria y hay escritura, aplica=true y verificar normalmente.
Si uif_en_escritura=true: nombre_autorizacion_vs_uif y dni_autorizacion_vs_uif tienen aplica=false, ok=null, detalle="UIF se firma en escritura, no aplica".

Cruces nombre_autorizacion_vs_dni y dni_autorizacion_vs_dni: buscá en el array "dnis" la entrada cuyo nombre coincida con firmante_nombre (el firmante real, quien firmó de puño y letra o electrónicamente) y compará contra ella. Si hay varios firmantes (multiples_autorizaciones=true), verificá que cada firmante tenga su entrada correspondiente en "dnis" y que los DNI coincidan; detallalo para cada uno.
Cruces nombre_autorizacion_vs_uif y dni_autorizacion_vs_uif (cuando aplican): mismo criterio pero buscando en el array "uifs" la entrada del firmante.
Estos cruces son sobre el/los firmante(s) de la autorización, no reemplazan la verificación de documentos_faltantes de TODOS los herederos obligados (que puede incluir personas que no firmaron por tener poder que las representa).

FIRMAS ELECTRÓNICAS (Contractia u otra plataforma similar): Muchos documentos incluyen, además de las firmas manuscritas, una página final "Detalle de Firmas" de una plataforma de firma electrónica, con Nombre, Email, Fecha y Código de firma de cada firmante electrónico. Estos documentos suelen tener en el encabezado de CADA página la leyenda "Documento firmado electrónicamente en [plataforma] el [fecha] con Código de Auditoría: [código]".
Regla: si ese mismo Código de Auditoría aparece en el encabezado de TODAS las páginas del PDF (incluidas las páginas de la Autorización en sí, no solo la última hoja de detalle de firmas o un certificado anexo), la firma electrónica de esa persona es válida para la TOTALIDAD del documento, con el mismo efecto que una firma de puño y letra. Tratá a esa persona como firmante pleno de la autorización.
En ese caso: multiples_autorizaciones puede ser true (manuscrita + electrónica combinadas son válidas como conjunto), declaratoria_vs_autorizacion.ok=true si todos los herederos firmaron (de puño y letra o electrónicamente, indistintamente), y NO generes alertas de duda tipo "falta confirmar si la firma electrónica corresponde a la Autorización o solo a otro anexo" cuando el código de auditoría del encabezado es idéntico en todas las páginas del PDF — eso ya lo confirma. Solo marcá ok=false o generá alerta si el código de auditoría de la página de detalle de firmas NO coincide con el de las páginas de la Autorización (indicio de que la firma electrónica pertenece a un documento distinto).

M² declarados: NO se extraen ni se verifican en la Autorización (no es un dato obligatorio ahí y no se cruza). Si hay Escritura presentada, extraé los m² ÚNICAMENTE de ahí, con esta prioridad:
1. Superficie explícita (superficie cubierta, sup. total, m², etc).
2. Si no hay, buscar medidas de frente y fondo (en números o letras), convertir a metros y multiplicar frente×fondo. Indicar ej: "~487 m² (calculado frente×fondo)".
3. Si no se pueden determinar, null y alerta "M² no encontrados en escritura, verificar manualmente".
Si NO hay Escritura presentada (por ejemplo, en una locación sin escritura adjunta), dejá los campos de m² en null y NO generes ninguna alerta al respecto — no es un dato disponible ni obligatorio en ese caso.
NO confundir m² con números de matrícula, partida, nomenclatura catastral, folio, tomo o inscripción RPI.
No generes ningún cruce ni alerta comparando m² de la autorización contra la escritura.
Cédula catastral: NO es requerida. No mencionarla en documentos_faltantes.

VALOR AUTORIZADO: extraé de la Autorización el monto/precio autorizado tal como figura en el texto, con moneda incluida (ej: "USD 150.000", "$ 450.000 por mes", "U$S 120.000"). Si el documento no menciona un valor, dejalo en null.

CERTIFICADO DE GARANTÍA DE SERVICIOS PROFESIONALES: este documento suele estar al final de la Autorización (o como anexo). IMPORTANTE - a quién extraer: el certificado suele nombrar a DOS personas distintas: (1) el corredor/martillero matriculado que emite o avala el certificado (es una firma responsable, NO es el agente), y (2) el agente inmobiliario operativo de RE/MAX a cargo de la operación, cuyo nombre aparece INMEDIATAMENTE ANTES de la frase "en lo sucesivo, el 'agente'" (o variantes como "en adelante, el 'agente'"). Extraé como certificado_servicios.agente_nombre exclusivamente a esta segunda persona (la nombrada justo antes de esa frase), nunca al corredor/martillero que firma o avala el certificado aunque su nombre también aparezca en el documento. Extraé su nombre completo, y su DNI en agente_dni si está impreso ahí (dejalo null si no figura). certificado_servicios.encontrado=true si ese certificado está presente en algún documento adjunto (aunque sea como página final de la Autorización). Si no se encuentra en ningún documento, o si no aparece la frase "en lo sucesivo, el 'agente'" (o variante equivalente) que permita identificar con certeza al agente, encontrado=false y agente_nombre/agente_dni en null — no adivines ni uses el nombre del corredor/martillero como fallback. Este campo es solo informativo, no es un documento obligatorio ni se cruza con nada ni genera alertas por su ausencia.

REGLAMENTO DE COPROPIEDAD (opcional, solo si se adjunta): buscá cláusulas sobre el destino/uso permitido de la unidad (vivienda, profesional, comercial, mixto, u otro). reglamento_copropiedad.encontrado=true si el documento fue adjuntado. permite_uso_profesional y permite_uso_comercial: true/false según lo que indique el reglamento, o null si no lo aclara explícitamente. detalle: citá brevemente la cláusula relevante. Si el Reglamento NO fue adjuntado, reglamento_copropiedad.encontrado=false y dejá los demás campos en null; esto NUNCA es un documento obligatorio — no lo agregues a "documentos_faltantes" ni generes alerta por su ausencia.

fecha_vencimiento_calculada: sumá plazo_dias_habiles a fecha_firma contando solo días hábiles (lun-vie), excluyendo feriados de Argentina 2025-2026: 2026-06-15, 2026-06-20, 2026-07-09, 2026-07-10, 2026-08-17, 2026-10-12, 2026-11-23, 2026-12-07, 2026-12-08, 2026-12-25.

VEREDICTO: APTO si todos los obligatorios presentes y todos los cruces que aplican con ok=true. OBSERVADO si algún cruce falla o inconsistencias menores pero están todos los docs. RECHAZADO si falta algún obligatorio.
En alertas: cualquier inconsistencia, dato ilegible o situación que merece atención.
NO generes una alerta solo para informar que un agente colaborador, escribano, martillero u otro profesional mencionado en el Certificado de Garantía de Servicios Profesionales u otro anexo no presentó DNI o UIF — eso nunca es obligatorio para ellos porque no son parte compradora/vendedora. Si no hay ninguna irregularidad real asociada a esa persona, simplemente no la menciones.`;

function PasswordField({ value, onChange, onKeyDown, autoFocus, placeholder }) {
  const [show, setShow] = useState(false);
  return (
    <div className="password-field">
      <input
        className="form-field__input"
        type={show ? "text" : "password"}
        value={value}
        onChange={onChange}
        onKeyDown={onKeyDown}
        autoFocus={autoFocus}
        placeholder={placeholder}
      />
      <button type="button" className="password-field__toggle" onClick={() => setShow(s => !s)} aria-label={show ? "Ocultar contraseña" : "Mostrar contraseña"} tabIndex={-1}>
        {show ? <IconEyeOff/> : <IconEye/>}
      </button>
    </div>
  );
}

const ROL_LABELS = { propietario: "Propietario", administrador: "Administrador", staff: "Staff" };

const isAdminRoute = new URLSearchParams(window.location.search).get("admin") === "1";

function App() {
  const [files, setFiles] = useState([]);
  const [stage, setStage] = useState(isAdminRoute ? "admin" : "checking");
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [drag, setDrag] = useState(false);
  const [sessionNombre, setSessionNombre] = useState(null);
  const [sessionRol, setSessionRol] = useState(null);
  const [sessionUsername, setSessionUsername] = useState(null);
  const [loginUsername, setLoginUsername] = useState("");
  const [loginPassword, setLoginPassword] = useState("");
  const [loginError, setLoginError] = useState(null);
  const [historial, setHistorial] = useState([]);
  const [histOpen, setHistOpen] = useState(false);
  const [adminPassword, setAdminPassword] = useState("");
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminError, setAdminError] = useState(null);
  const [adminUsuarios, setAdminUsuarios] = useState([]);
  const [newUserUsername, setNewUserUsername] = useState("");
  const [newUserPassword, setNewUserPassword] = useState("");
  const [newUserNombre, setNewUserNombre] = useState("");
  const [newUserRol, setNewUserRol] = useState("staff");
  const [gestionUsuarios, setGestionUsuarios] = useState([]);
  const [gestionError, setGestionError] = useState(null);
  const [gestNewNombre, setGestNewNombre] = useState("");
  const [gestNewUsername, setGestNewUsername] = useState("");
  const [gestNewPassword, setGestNewPassword] = useState("");
  const [gestNewRol, setGestNewRol] = useState("staff");
  const [resetRow, setResetRow] = useState(null);
  const [resetPasswordValue, setResetPasswordValue] = useState("");
  const [preGestionStage, setPreGestionStage] = useState("upload");
  const [baseFileCount, setBaseFileCount] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const inputRef = useRef();
  const menuRef = useRef();

  useEffect(() => {
    if (!menuOpen) return;
    function onClick(e) {
      if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
    }
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, [menuOpen]);

  useEffect(() => {
    if (isAdminRoute) return;
    fetch("/api/me").then(r => r.json()).then(d => {
      if (d.nombre) {
        setSessionNombre(d.nombre);
        setSessionRol(d.rol || "staff");
        setSessionUsername(d.username || null);
        setStage("upload");
        fetch("/api/historial").then(r => r.json()).then(dh => setHistorial(dh.items || [])).catch(() => {});
      } else {
        setStage("login");
      }
    }).catch(() => setStage("login"));
  }, []);

  async function login() {
    setLoginError(null);
    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: loginUsername, password: loginPassword })
      });
      const data = await res.json();
      if (!res.ok) { setLoginError(data.error || "No se pudo iniciar sesión"); return; }
      setSessionNombre(data.nombre);
      setSessionRol(data.rol || "staff");
      setSessionUsername(loginUsername);
      setStage("upload");
      fetch("/api/historial").then(r => r.json()).then(dh => setHistorial(dh.items || [])).catch(() => {});
    } catch (e) {
      setLoginError("No se pudo conectar con el servidor");
    }
  }

  async function logout() {
    try { await fetch("/api/logout", { method: "POST" }); } catch (e) {}
    setSessionNombre(null);
    setSessionRol(null);
    setSessionUsername(null);
    setResult(null);
    setFiles([]);
    setBaseFileCount(0);
    setStage("login");
  }

  // Wrapper de fetch para endpoints autenticados: si la sesión expiró (401, por
  // inactividad de más de 40 minutos o por haber cerrado el navegador), vuelve
  // automáticamente a la pantalla de login en lugar de fallar en silencio.
  async function apiFetch(url, opts) {
    const res = await fetch(url, opts);
    if (res.status === 401) {
      setSessionNombre(null);
      setSessionRol(null);
      setSessionUsername(null);
      setStage("login");
      setLoginError("Tu sesión expiró, iniciá sesión de nuevo");
    }
    return res;
  }

  function abrirGestion() {
    setPreGestionStage(stage === "gestion" ? preGestionStage : stage);
    setGestionError(null);
    setResetRow(null);
    setStage("gestion");
    cargarGestionUsuarios();
  }

  function cerrarGestion() {
    setStage(preGestionStage);
  }

  async function cargarGestionUsuarios() {
    try {
      const res = await apiFetch("/api/usuarios");
      if (res.status === 401) return;
      const data = await res.json();
      if (!res.ok) { setGestionError(data.error || "No se pudo cargar la lista de usuarios"); return; }
      setGestionUsuarios(data.usuarios || []);
    } catch (e) {
      setGestionError("No se pudo conectar con el servidor");
    }
  }

  async function agregarGestUsuario() {
    setGestionError(null);
    try {
      const res = await apiFetch("/api/usuarios", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: gestNewUsername, password: gestNewPassword, nombre: gestNewNombre, rol: gestNewRol })
      });
      if (res.status === 401) return;
      const data = await res.json();
      if (!res.ok) { setGestionError(data.error || "No se pudo agregar el usuario"); return; }
      setGestNewUsername(""); setGestNewPassword(""); setGestNewNombre(""); setGestNewRol("staff");
      cargarGestionUsuarios();
    } catch (e) {
      setGestionError("No se pudo conectar con el servidor");
    }
  }

  async function eliminarGestUsuario(username) {
    if (!window.confirm(`¿Eliminar al usuario ${username}? Esta acción no se puede deshacer.`)) return;
    setGestionError(null);
    try {
      const res = await apiFetch("/api/usuarios/eliminar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });
      if (res.status === 401) return;
      const data = await res.json();
      if (!res.ok) { setGestionError(data.error || "No se pudo eliminar el usuario"); return; }
      cargarGestionUsuarios();
    } catch (e) {
      setGestionError("No se pudo conectar con el servidor");
    }
  }

  async function confirmarResetPassword(username) {
    if (!resetPasswordValue || resetPasswordValue.length < 4) { setGestionError("La contraseña debe tener al menos 4 caracteres"); return; }
    setGestionError(null);
    try {
      const res = await apiFetch("/api/usuarios/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password: resetPasswordValue })
      });
      if (res.status === 401) return;
      const data = await res.json();
      if (!res.ok) { setGestionError(data.error || "No se pudo restablecer la contraseña"); return; }
      setResetRow(null);
      setResetPasswordValue("");
    } catch (e) {
      setGestionError("No se pudo conectar con el servidor");
    }
  }

  async function cargarAdminUsuarios(pass) {
    setAdminError(null);

      const res = await fetch("/api/admin/usuarios?adminPassword=" + encodeURIComponent(pass));
      const data = await res.json();
      if (!res.ok) { setAdminError(data.error || "No se pudo validar la contraseña"); return; }
      setAdminUsuarios(data.usuarios || []);
      setAdminAuthed(true);
    } catch (e) {
      setAdminError("No se pudo conectar con el servidor");
    }
  }

  async function agregarUsuario() {
    setAdminError(null);
    try {
      const res = await fetch("/api/admin/usuarios", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ adminPassword, username: newUserUsername, password: newUserPassword, nombre: newUserNombre, rol: newUserRol })
      });
      const data = await res.json();
      if (!res.ok) { setAdminError(data.error || "No se pudo agregar el usuario"); return; }
      setNewUserUsername(""); setNewUserPassword(""); setNewUserNombre(""); setNewUserRol("staff");
      cargarAdminUsuarios(adminPassword);
    } catch (e) {
      setAdminError("No se pudo conectar con el servidor");
    }
  }

  async function eliminarUsuario(username) {
    setAdminError(null);
    try {
      const res = await fetch("/api/admin/usuarios/eliminar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ adminPassword, username })
      });
      const data = await res.json();
      if (!res.ok) { setAdminError(data.error || "No se pudo eliminar el usuario"); return; }
      cargarAdminUsuarios(adminPassword);
    } catch (e) {
      setAdminError("No se pudo conectar con el servidor");
    }
  }

  function addFiles(list) {
    const pdfs = [...list].filter(f => f.type === "application/pdf");
    setFiles(prev => {
      const names = prev.map(f => f.name);
      return [...prev, ...pdfs.filter(f => !names.includes(f.name))];
    });
  }
  function removeFile(name) { setFiles(prev => prev.filter(f => f.name !== name)); }

  function abrirHistorialItem(item) {
    setResult(item.resultado);
    setStage("report");
    setHistOpen(false);
    setBaseFileCount(0);
  }

  async function eliminarHistorialItem(id) {
    if (!window.confirm("¿Eliminar este análisis del historial? Esta acción no se puede deshacer.")) return;
    try {
      const res = await apiFetch("/api/historial/eliminar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });
      if (res.status === 401) return;
      const data = await res.json();
      if (!res.ok) { alert(data.error || "No se pudo eliminar del historial"); return; }
      setHistorial(prev => prev.filter(h => h.id !== id));
    } catch (e) {
      alert("No se pudo conectar con el servidor");
    }
  }

  async function guardarEnHistorial(parsed) {
    try {
      const body = {
        agente: parsed.certificado_servicios?.agente_nombre || null,
        direccion: parsed.inmueble?.direccion || null,
        veredicto: parsed.veredicto || null,
        resultado: parsed
      };
      const res = await fetch("/api/historial", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.entry) setHistorial(prev => [data.entry, ...prev]);
    } catch (e) {
      // No bloquear el informe si falla el guardado del historial
    }
  }

  async function analyze() {
    setStage("loading"); setError(null);
    try {
      const content = [];
      // Si estamos agregando documentación a un análisis ya hecho, marcamos el límite
      // de los documentos que ya se habían enviado antes como punto de caché: si se
      // vuelve a analizar en los próximos minutos, esos PDFs no se recobran a precio
      // completo (además del ahorro del system prompt, cacheado siempre más abajo).
      const marcarCacheEn = (baseFileCount > 0 && files.length > baseFileCount) ? baseFileCount - 1 : -1;
      for (let i = 0; i < files.length; i++) {
        const b64 = await toBase64(files[i]);
        const block = { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 }, title: files[i].name };
        if (i === marcarCacheEn) block.cache_control = { type: "ephemeral" };
        content.push(block);
      }

      const res = await apiFetch("/api/analizar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 4000,
          system: [{ type: "text", text: SYSTEM_PROMPT, cache_control: { type: "ephemeral" } }],
          messages: [{ role: "user", content }]
        })
      });
      if (res.status === 401) return;
      const data = await res.json();
      if (data.error) throw new Error(typeof data.error === "string" ? data.error : data.error.message);
      const raw = data.content.map(i => i.text || "").join("").replace(/```json|```/g, "").trim();
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No se encontró JSON en la respuesta");
      const parsed = JSON.parse(jsonMatch[0]);
      setResult(parsed);
      setStage("report");
      setBaseFileCount(files.length);
      guardarEnHistorial(parsed);
    } catch (e) {
      setError(e.message);
      setStage("upload");
    }
  }

      <span className="checkrow__icon">{icon}</span>

                  </div>
                )}

                {(r.uifs||[]).length > 0 && (
                  <div className="card">
                    <div className="card__title">Formularios UIF presentados</div>
                    <div className="datagrid">
                      {r.uifs.flatMap((u,i) => [
                        <DC key={"un"+i} label="Nombre" value={u.nombre}/>,
                        <DC key={"ud"+i} label="DNI" value={u.dni}/>,
                        <DC key={"up"+i} label="Declaración PEP" value={u.pep_completado ? (u.pep_resultado === "SI" ? "Completada — SÍ es PEP" : "Completada — No es PEP") : "No presentada"} span/>
                      ])}
                    </div>
                  </div>
                )}

                {r.declaratoria?.encontrada && (
                  <div className="card">
                    <div className="card__title">Declaratoria de Herederos</div>
                    <div className="datagrid">
                      {(r.declaratoria?.herederos||[]).length === 0 ? <DC label="Herederos" value="No identificados" span/> :
                        r.declaratoria.herederos.flatMap((h,i) => [<DC key={"hn"+i} label={"Heredero "+(i+1)} value={h.nombre}/>, <DC key={"hd"+i} label="DNI" value={h.dni||"—"}/>])}
                    </div>
                  </div>
                )}

                {r.poder?.encontrado && (
                  <div className="card">
                    <div className="card__title">Poder Notarial</div>
                    <div className="datagrid">
                      <DC label="Apoderado" value={r.poder?.apoderado_nombre}/>
                      <DC label="DNI Apoderado" value={r.poder?.apoderado_dni}/>
                      <DC label="Poderdante" value={r.poder?.poderdante_nombre}/>
                      <DC label="Vigente" value={r.poder?.vigente === true ? "Sí" : r.poder?.vigente === false ? "No" : "—"}/>
                    </div>
                  </div>
                )}

                <div className="card">
                  <div className="card__title">Documentos obligatorios</div>
                  {(r.documentos_faltantes||[]).length === 0 ? <CR status="ok" label="Todos los documentos obligatorios presentes"/> :
                    r.documentos_faltantes.map((f,i) => <CR key={i} status="err" label={f}/>)}
                </div>

                <div className="card">
                  <div className="card__title">Verificación cruzada</div>
                  {Object.entries(r.cruces||{}).map(([key,val]) => {
                    const na = val.aplica === false;
                    return <CR key={key} status={na ? "na" : val.ok ? "ok" : "err"} label={CRUCES_LABELS[key]||key} detail={val.detalle}/>;
                  })}
                </div>

                {(r.alertas||[]).length > 0 && (
                  <div className="card">
                    <div className="card__title">Alertas</div>
                    {r.alertas.map((a,i) => <CR key={i} status="warn" label={a}/>)}
                  </div>
                )}

                <button className="btn btn-primary" onClick={() => setStage("upload")}>+ Agregar más documentación a este análisis</button>
                <button className="btn btn-ghost" onClick={() => { setStage("upload"); setResult(null); setFiles([]); setBaseFileCount(0); }}>← Analizar otra propiedad</button>
              </div>
            );
          })()}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
